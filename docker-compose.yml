version: '3.8'

services:
  # Watchtower Backend API & Background Agent
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: watchtower-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - WATCHTOWER_CYCLE_MINUTES=15
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

networks:
  default:
    name: watchtower-network
    driver: bridge
